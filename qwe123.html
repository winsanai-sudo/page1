<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 초강스 블로그 초블 - 6주 과정</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; background: #020617; color: white; }
    .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body class="min-h-screen">

  <header class="sticky top-0 z-40 bg-slate-950/90 border-b border-white/10 backdrop-blur">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <h1 class="font-bold text-lg">초강스 블로그 초블</h1>
      <div id="header-status"></div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <!-- 로그인 영역 -->
    <section id="login-section" class="max-w-lg mx-auto glass-panel p-8 rounded-3xl">
      <h2 class="text-2xl font-bold mb-6">로그인</h2>
      <div class="space-y-4">
        <div>
          <label class="text-xs text-slate-400">클래스 선택</label>
          <div class="grid grid-cols-2 gap-2 mt-1">
            <button onclick="setRole('Junior')" id="btn-jr" class="p-3 bg-emerald-600 rounded-xl text-sm font-bold">주니어</button>
            <button onclick="setRole('Senior')" id="btn-sr" class="p-3 bg-slate-800 rounded-xl text-sm font-bold">시니어</button>
          </div>
        </div>
        <input id="in-name" type="text" placeholder="이름 입력" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl">
        <input id="in-phone" type="text" placeholder="전화번호" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl">
        <button onclick="login()" class="w-full p-3 bg-emerald-500 rounded-xl font-bold">입장하기</button>
        <button onclick="adminLogin()" class="w-full p-3 bg-slate-800 rounded-xl font-bold text-xs mt-4">관리자 로그인</button>
      </div>
    </section>

    <!-- 학생 뷰 -->
    <section id="student-section" class="hidden space-y-6">
      <div id="student-info" class="glass-panel p-6 rounded-3xl"></div>
      <div id="mission-form" class="glass-panel p-6 rounded-3xl space-y-4">
        <h3 class="text-xl font-bold">주차별 미션</h3>
        <input id="edit-url" type="text" placeholder="블로그 URL" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl">
        <div class="grid grid-cols-2 gap-2">
          <label><input type="checkbox" id="c1"> 1분이상체류</label>
          <label><input type="checkbox" id="c2"> 서이추</label>
          <label><input type="checkbox" id="c3"> 좋아요</label>
          <label><input type="checkbox" id="c4"> 비밀댓글</label>
        </div>
        <button onclick="saveMission()" class="w-full p-3 bg-emerald-500 rounded-xl font-bold">저장</button>
      </div>
    </section>

    <!-- 관리자 뷰 -->
    <section id="admin-section" class="hidden space-y-6">
      <div class="glass-panel p-6 rounded-3xl overflow-x-auto">
        <table class="w-full text-sm text-left">
          <thead>
            <tr class="text-slate-400 border-b border-white/10">
              <th class="p-3">이름</th>
              <th class="p-3">1주차</th><th class="p-3">2주차</th><th class="p-3">3주차</th>
              <th class="p-3">4주차</th><th class="p-3">5주차</th><th class="p-3">휴식</th>
            </tr>
          </thead>
          <tbody id="admin-table"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    let users = JSON.parse(localStorage.getItem('bl_data')) || [];
    let currentUser = null;
    let isAdmin = false;
    let role = 'Junior';

    function setRole(r) { role = r; document.getElementById('btn-jr').className = r==='Junior'?'p-3 bg-emerald-600 rounded-xl':'p-3 bg-slate-800 rounded-xl'; document.getElementById('btn-sr').className = r==='Senior'?'p-3 bg-emerald-600 rounded-xl':'p-3 bg-slate-800 rounded-xl'; }

    function login() {
      const name = document.getElementById('in-name').value;
      const phone = document.getElementById('in-phone').value;
      if(!name) return;
      currentUser = users.find(u => u.name === name) || { id: Date.now(), name, phone, role, subs: {} };
      if(!users.find(u => u.id === currentUser.id)) users.push(currentUser);
      document.getElementById('login-section').classList.add('hidden');
      document.getElementById('student-section').classList.remove('hidden');
      renderStudent();
    }

    function adminLogin() {
      const pw = prompt("관리자 비밀번호");
      if(pw === 'akdldpa1946') { isAdmin = true; document.getElementById('login-section').classList.add('hidden'); document.getElementById('admin-section').classList.remove('hidden'); renderAdmin(); }
    }

    function saveMission() {
      const week = 1; // 기본 1주차
      currentUser.subs[week] = { 
        url: document.getElementById('edit-url').value, 
        c1: document.getElementById('c1').checked,
        c2: document.getElementById('c2').checked,
        c3: document.getElementById('c3').checked,
        c4: document.getElementById('c4').checked 
      };
      localStorage.setItem('bl_data', JSON.stringify(users));
      alert("저장되었습니다.");
    }

    function renderStudent() {
      document.getElementById('student-info').innerHTML = `<h3>${currentUser.name}님 환영합니다.</h3>`;
    }

    function renderAdmin() {
      const tb = document.getElementById('admin-table');
      tb.innerHTML = users.map(u => `
        <tr class="border-b border-white/5">
          <td class="p-3">${u.name}</td>
          <td class="p-3">${u.subs['1'] ? '✅' : '❌'}</td>
          <td class="p-3">...</td><td class="p-3">...</td>
          <td class="p-3">...</td><td class="p-3">...</td>
          <td class="p-3">...</td>
        </tr>
      `).join('');
    }
  </script>
</body>
</html>
